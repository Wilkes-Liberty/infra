# =============================================
# Alertmanager Configuration
# WilkesLiberty Infrastructure
# =============================================

global:
  # SMTP configuration for email alerts
  smtp_smarthost: '${ALERT_SMTP_HOST}:${ALERT_SMTP_PORT}'
  smtp_from: '${ALERT_EMAIL_FROM}'
  smtp_auth_username: '${ALERT_SMTP_USER}'
  smtp_auth_password: '${ALERT_SMTP_PASSWORD}'
  smtp_require_tls: true

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  
  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
    
    # Warning alerts - hourly digest
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 5m
      group_interval: 30m
      repeat_interval: 12h
    
    # Info alerts - daily summary
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 1h
      repeat_interval: 24h

# Receivers (notification endpoints)
receivers:
  # Default receiver
  - name: 'default'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        headers:
          Subject: '[WilkesLiberty] Alert Notification'

  # Critical alerts (email + Slack)
  - name: 'critical-alerts'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        headers:
          Subject: '🚨 [CRITICAL] WilkesLiberty Infrastructure Alert'
        html: |
          <h2>Critical Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Service:</strong> {{ .GroupLabels.service }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
    
    # Uncomment to enable Slack
    # slack_configs:
    #   - api_url: '${ALERT_SLACK_WEBHOOK_URL}'
    #     channel: '#infrastructure-alerts'
    #     title: '🚨 Critical Alert: {{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.summary }}'

  # Warning alerts (email digest)
  - name: 'warning-alerts'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        headers:
          Subject: '⚠️ [WARNING] WilkesLiberty Infrastructure'
        html: |
          <h2>Warning Alerts</h2>
          {{ range .Alerts }}
          <p><strong>{{ .Labels.alertname }}</strong>: {{ .Annotations.summary }}</p>
          {{ end }}

  # Info alerts (daily summary)
  - name: 'info-alerts'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        headers:
          Subject: 'ℹ️ [INFO] WilkesLiberty Daily Summary'
        html: |
          <h2>Daily Infrastructure Summary</h2>
          {{ range .Alerts }}
          <p>{{ .Annotations.summary }}</p>
          {{ end }}

# Inhibition rules (suppress alerts based on other alerts)
inhibit_rules:
  # Suppress warning/info alerts if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match_re:
      severity: 'warning|info'
    equal: ['alertname', 'instance']
  
  # Suppress individual service alerts if overall service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service']
