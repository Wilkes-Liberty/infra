# =============================================
# WilkesLiberty Production Docker Compose Stack
# Architecture: All backend services on on-prem server
# =============================================
# Services:
#   Application: Drupal 11, PostgreSQL, Redis, Keycloak, Solr
#   Frontend:    Next.js (dev only — production runs on Njalla VPS)
#   Monitoring:  Prometheus, Grafana, Alertmanager, Exporters
# =============================================
# Usage:
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Prod: docker compose up (builds images from webcms/ui repos)
# =============================================

services:
  # ================== APPLICATION SERVICES ==================

  drupal:
    build:
      context: ../..           # ~/Repositories/ — parent of both infra and webcms repos
      dockerfile: infra/docker/drupal/Dockerfile.prod
    container_name: wl_drupal
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ~/nas_docker/drupal/files:/opt/drupal/web/sites/default/files
      - ~/nas_docker/drupal/private:/opt/drupal/private
    environment:
      - DRUPAL_DB_HOST=postgres
      - DRUPAL_DB_USER=drupal
      - DRUPAL_DB_PASSWORD=${DRUPAL_DB_PASSWORD:?DRUPAL_DB_PASSWORD is required}
      - DRUPAL_DB_NAME=drupal
      - DRUPAL_HASH_SALT=${DRUPAL_HASH_SALT:?DRUPAL_HASH_SALT is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - DRUPAL_ENVIRONMENT=production
    networks:
      - frontend
      - backend
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/user/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=80"
      - "prometheus.io/path=/metrics"

  postgres:
    image: postgres:16
    container_name: wl_postgres
    restart: unless-stopped
    volumes:
      - ~/nas_docker/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=drupal
      - POSTGRES_USER=drupal
      - POSTGRES_PASSWORD=${DRUPAL_DB_PASSWORD:?DRUPAL_DB_PASSWORD is required}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      # Exposed so the init script can create the keycloak database
      - KEYCLOAK_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drupal -d drupal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 6G
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_connections=200"

  redis:
    image: redis:7-alpine
    container_name: wl_redis
    restart: unless-stopped
    volumes:
      - ~/nas_docker/redis:/data
    environment:
      # Redis password — prevents unauthenticated access if the port is ever exposed.
      # Drupal must set redis.connection.password to the same value.
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - backend
    healthcheck:
      # Include password in health check so it works when AUTH is required
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Pure object cache: allkeys-lru eviction with RDB snapshots, no AOF
    # AOF removed — it logs every eviction, causing unnecessary disk I/O for cache workloads
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 300 1
      --save 60 10000
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: wl_keycloak
    restart: unless-stopped
    # Use production 'start' mode — NOT 'start-dev' (dev mode disables security features)
    command: start
    environment:
      # PostgreSQL backend — dedicated keycloak database, not shared with Drupal
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres
      - KC_DB_URL_PORT=5432
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      # Admin credentials
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      # HTTP configuration (TLS handled by reverse proxy)
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      # Proxy mode: Keycloak trusts X-Forwarded-* headers from the reverse proxy
      - KC_PROXY=edge
      # Enable health and metrics endpoints
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    ports:
      - "8081:8080"
      - "9000:9000"
    networks:
      - frontend
      - backend
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    volumes:
      - ~/nas_docker/keycloak:/opt/keycloak/data
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=9000"
      - "prometheus.io/path=/metrics"

  solr:
    image: solr:9.6
    container_name: wl_solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - ~/nas_docker/solr:/var/solr
    environment:
      - SOLR_HEAP=2g
      - SOLR_JAVA_MEM=-Xms2g -Xmx2g
    networks:
      - backend
      - monitoring
    healthcheck:
      # Ping the admin endpoint — note: this 404s until a core is created, which is expected
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=8983"
      - "prometheus.io/path=/admin/metrics"

  # ================== FRONTEND (DEV — overridden by docker-compose.dev.yml) ==================
  # In production, Next.js runs on the Njalla VPS, not here.
  # For on-prem server development, this service is activated via docker-compose.dev.yml.
  nextjs:
    build:
      context: ../..           # ~/Repositories/ — parent of both infra and ui repos
      dockerfile: infra/docker/nextjs/Dockerfile.prod
      args:
        NEXT_PUBLIC_DRUPAL_BASE_URL: http://drupal:80
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://wilkesliberty.com}
    container_name: wl_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Drupal is on the same Docker network — use internal hostname for SSR fetches
      - NEXT_PUBLIC_DRUPAL_BASE_URL=http://drupal:80
      - NEXT_IMAGE_DOMAIN=${NEXT_IMAGE_DOMAIN:-drupal}
      - DRUPAL_CLIENT_ID=${DRUPAL_CLIENT_ID:?DRUPAL_CLIENT_ID is required}
      - DRUPAL_CLIENT_SECRET=${DRUPAL_CLIENT_SECRET:?DRUPAL_CLIENT_SECRET is required}
      - DRUPAL_REVALIDATE_SECRET=${DRUPAL_REVALIDATE_SECRET:?DRUPAL_REVALIDATE_SECRET is required}
      - DRUPAL_PREVIEW_SECRET=${DRUPAL_PREVIEW_SECRET}
    networks:
      - frontend
    depends_on:
      drupal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    profiles:
      - frontend

  # ================== MONITORING STACK ==================

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: wl_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ~/nas_docker/prometheus/data:/prometheus
      - ~/nas_docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ~/nas_docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      # Docker socket required for docker_sd_configs dynamic service discovery
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  grafana:
    image: grafana/grafana:11.1.0
    container_name: wl_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ~/nas_docker/grafana:/var/lib/grafana
      - ~/nas_docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ~/nas_docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # No default — must be set in .env to force intentional password choice
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: wl_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ~/nas_docker/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - ~/nas_docker/alertmanager/data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: wl_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      # On macOS+Docker Desktop these mount the Linux VM filesystem, not host Mac hardware.
      # Metrics represent the Docker VM environment, which is what matters for container workloads.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: wl_cadvisor
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
    privileged: true
    # Note: /dev/kmsg removed — not available in macOS Docker Desktop environment
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: wl_postgres_exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://drupal:${DRUPAL_DB_PASSWORD:?DRUPAL_DB_PASSWORD is required}@postgres:5432/drupal?sslmode=disable
    networks:
      - backend
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# ================== NETWORKS ==================

networks:
  frontend:
    driver: bridge
    name: wl_frontend
    ipam:
      config:
        - subnet: 172.20.0.0/24

  backend:
    driver: bridge
    name: wl_backend
    ipam:
      config:
        - subnet: 172.21.0.0/24

  monitoring:
    driver: bridge
    name: wl_monitoring
    ipam:
      config:
        - subnet: 172.22.0.0/24

# ================== NOTES ==================
# Pinned image versions (update intentionally, not automatically):
#   postgres:16, redis:7-alpine, solr:9.6 — stable major versions
#   quay.io/keycloak/keycloak:25.0        — verify at https://quay.io/keycloak/keycloak
#   prom/prometheus:v2.53.0               — verify at https://github.com/prometheus/prometheus/releases
#   grafana/grafana:11.1.0                — verify at https://github.com/grafana/grafana/releases
#   prom/alertmanager:v0.27.0             — verify at https://github.com/prometheus/alertmanager/releases
#   prom/node-exporter:v1.8.1             — verify at https://github.com/prometheus/node_exporter/releases
#   gcr.io/cadvisor/cadvisor:v0.49.1      — verify at https://github.com/google/cadvisor/releases
#   prometheuscommunity/postgres-exporter:v0.15.0
#
# Keycloak uses its own 'keycloak' PostgreSQL database (not shared with Drupal)
# Keycloak runs in production 'start' mode (not dev mode)
# Redis is configured as a pure cache (allkeys-lru, no AOF)
# Next.js runs with profile 'frontend' — activate with --profile frontend or docker-compose.dev.yml
# Drupal and Keycloak are on wl_monitoring network so Prometheus can scrape them
