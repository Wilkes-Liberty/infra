int_domain: "int.wilkesliberty.com."

# CoreDNS binds on the Tailscale IP, NOT the LAN IP.
# This means the DNS server is only reachable when connected via Tailscale.
# onprem_tailscale_ip is defined in network_secrets.yml (SOPS-encrypted).
# Edit with: sops ansible/inventory/group_vars/network_secrets.yml
# Find the value by running: tailscale ip -4
coredns_listen_ip: "{{ onprem_tailscale_ip }}"
# IPv6: set onprem_tailscale_ipv6 in network_secrets.yml (run: tailscale ip -6)
# to enable dual-stack AAAA records and CoreDNS/Caddy v6 binding.
coredns_listen_ipv6: "{{ onprem_tailscale_ipv6 | default('') }}"
tailscale_cidr: "100.64.0.0/10"                   # Tailscale address space (do not change)

upstream_dns: ["1.1.1.1","9.9.9.9"]

internal_hosts:
  # Application services
  app: "{{ onprem_int_ip }}"
  sso: "{{ onprem_int_ip }}"

  # Data services (not proxied — DNS only)
  db: "{{ onprem_int_ip }}"
  search: "{{ onprem_int_ip }}"
  cache: "{{ onprem_int_ip }}"

  # Monitoring
  monitor: "{{ onprem_int_ip }}"
  prometheus: "{{ onprem_int_ip }}"
  alerts: "{{ onprem_int_ip }}"
  uptime: "{{ onprem_int_ip }}"

  # Admin devices — IPs are defined in network_secrets.yml (SOPS-encrypted).
  # Edit with: sops ansible/inventory/group_vars/network_secrets.yml
  # Assign static/reserved DHCP leases on your router so these never change.
  nas: "{{ nas_int_ip }}"
  modem: "{{ modem_int_ip }}"
  switch: "{{ coredns_switch_ip }}"
  printer: "{{ coredns_printer_ip }}"

# Caddy admin port variables — used in Caddyfile.internal.j2
# nas_int_ip and modem_int_ip come directly from network_secrets.yml (SOPS-encrypted).
# Redefining them here as {{ internal_hosts.nas/modem }} creates a circular reference.
nas_admin_port: "5001"       # Synology DSM HTTPS port (5000 is HTTP; Caddy needs TLS upstream)

modem_admin_port: "80"       # AT&T ISP modem admin port

switch_int_ip: "{{ internal_hosts.switch }}"
switch_admin_port: "80"      # TP-Link smart switch defaults to port 80

printer_int_ip: "{{ internal_hosts.printer }}"
printer_admin_port: "80"     # Most printers default to port 80 for admin

uptime_int_ip: "{{ internal_hosts.uptime }}"
uptime_admin_port: "3002"    # Uptime Kuma default port

reverse_cidr: "{{ dns_reverse_cidr }}"
reverse_zone: "{{ dns_reverse_zone }}"
