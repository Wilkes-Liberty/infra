# =============================================
# WilkesLiberty Infrastructure Inventory
# Simplified 2-Host Configuration
# =============================================
# Architecture:
#   - Mac Mini M4 Pro (on-prem): All backend services via Docker Compose
#   - Njalla VPS (cloud): Next.js frontend + Caddy reverse proxy
# =============================================

# On-premises Mac Mini server (runs Docker Compose stack)
[wl-onprem]
localhost ansible_connection=local ansible_python_interpreter=/opt/homebrew/bin/python3

# Njalla VPS (Next.js frontend + reverse proxy)
[njalla-vps]
# TODO: Replace with actual Njalla VPS IP address
# Example: 1.2.3.4 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

# Global variables
[all:vars]
ansible_python_interpreter=/usr/bin/python3
