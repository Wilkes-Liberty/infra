# =============================================
# WilkesLiberty Infrastructure Inventory
# Simplified 2-Host Configuration
# =============================================
# Architecture:
#   - On-prem server (on-prem): All backend services via Docker Compose
#   - Njalla VPS (cloud): Next.js frontend + Caddy reverse proxy
# =============================================

# On-premises server (runs Docker Compose stack)
[wl-onprem]
localhost ansible_connection=local ansible_python_interpreter=/opt/homebrew/bin/python3

# Cloud VPS (Next.js frontend + reverse proxy)
# Connects via Tailscale MagicDNS — SSH is Tailscale-only, no public port 22.
# Public IP (80.78.28.105) is HTTP/HTTPS ingress only.
# Requires: tailscale up + authenticated to tailnet before running make vps.
# Fallback IP: 100.76.191.57 (use if MagicDNS is not resolving)
[cloud-vps]
wl-vps.tail04aba8.ts.net ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_ed25519

# Global variables
[all:vars]
ansible_python_interpreter=/usr/bin/python3
