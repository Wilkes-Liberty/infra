# =============================================================================
# app_secrets.yml — Application OAuth2 / Integration Secrets
# =============================================================================
# SOPS-encrypted. Encrypt before committing:
#   sops --encrypt --in-place ansible/inventory/group_vars/app_secrets.yml
#
# These values CANNOT be set until Drupal is fully installed and the OAuth2
# consumer + Next.js module are configured. After configuring Drupal:
#   1. Add the values below
#   2. Encrypt: sops --encrypt --in-place ansible/inventory/group_vars/app_secrets.yml
#   3. Re-run: make onprem
#
# Covered by .sops.yaml rule: ansible/inventory/group_vars/.*_secrets\.yml$
# =============================================================================

# Drupal OAuth2 consumer (created at /admin/config/services/consumer)
drupal_client_id: ""
drupal_client_secret: ""

# Next.js ISR revalidation secret (set in Drupal at /admin/config/services/next)
drupal_revalidate_secret: ""

# Draft/preview mode secret (must match the Drupal Next.js module config)
drupal_preview_secret: ""
