# ── Domain Configuration ─────────────────────────────────────────────
domain: wilkesliberty.com
int_domain: int.wilkesliberty.com

# ── Network & Access Control ─────────────────────────────────────────
tailscale_network_cidr: "100.64.0.0/10"    # Tailscale mesh subnet

# Admin access: restrict SSH and admin UIs to these CIDRs
admin_allow_cidrs:
  - 203.0.113.0/24     # Replace with your Proton Business egress or office IPs
  - 203.0.113.10/32    # Replace with your specific admin IP

# ── Host Internal IP Addresses ────────────────────────────────────────
# Two-host architecture: on-prem server + Njalla VPS.
# All backend services run on on-prem; VPS is Caddy public ingress only.
# Set onprem_int_ip to the LAN IP assigned by your router (check DHCP table).
onprem_int_ip: 10.10.0.2      # On-prem server: Drupal, Postgres, Redis, Solr, Keycloak, monitoring

# CoreDNS and internal Caddy bind on the on-prem Tailscale IP.
# Populate after first `tailscale up` on on-prem: run `tailscale ip -4`
coredns_ts_ip: ""              # e.g. 100.64.0.1

# ── Admin Device Internal IP Addresses ────────────────────────────────
# These are used by Caddyfile.internal.j2 to reverse-proxy device admin UIs
# at *.int.wilkesliberty.com over HTTPS (wildcard cert).
# TODO: Replace placeholders with actual static/reserved DHCP IPs.
# Assign static leases on your router so these never drift.
# Run `arp -a` or check your router's DHCP table to find current IPs.

# Synology NAS — nas.int.wilkesliberty.com
nas_int_ip: "10.10.0.20"       # TODO: set actual IP
nas_admin_port: "5000"         # Synology DSM HTTP = 5000; HTTPS = 5001; TrueNAS = 80/443

# AT&T router — router.int.wilkesliberty.com
router_int_ip: "10.10.0.1"    # Usually the default gateway; confirm in router UI
router_admin_port: "80"        # AT&T BGW320 = 80 (HTTP only internally)

# TP-Link managed switch — switch.int.wilkesliberty.com
switch_int_ip: "10.10.0.50"   # TODO: set actual IP (check router DHCP table)
switch_admin_port: "80"        # TP-Link smart switches default to port 80

# Network printer — print.int.wilkesliberty.com
printer_int_ip: "10.10.0.30"  # TODO: set actual IP
printer_admin_port: "80"       # Most printers expose admin on port 80

# Uptime Kuma — uptime.int.wilkesliberty.com (runs on on-prem server)
uptime_int_ip: "10.10.0.7"    # Same host as monitoring stack
uptime_admin_port: "3002"      # Uptime Kuma default port

# ── Repository URLs ───────────────────────────────────────────────────
# webcms = Drupal CMS (headless backend) — built into the Drupal Docker image; serves api.wilkesliberty.com
# ui     = Next.js frontend — built into the Next.js Docker image; serves www.wilkesliberty.com
# Both repos are cloned at the 'staging' branch for the staging stack.
webcms_repo_url: "git@github.com:wilkesliberty/webcms.git"
ui_repo_url: "git@github.com:wilkesliberty/ui.git"

# ── Software Versions ─────────────────────────────────────────────────
php_version: "8.3"
node_major: "20"
solr_version: "9.6.1"

# ── Alert / Notification Settings ─────────────────────────────────────
# Used to render docker/alertmanager/config.yml.j2 via the wl-onprem role.
# Override SMTP secrets in an encrypted group_vars file (e.g. sso_secrets.yml).
alert_smtp_host: "smtp.protonmail.ch"
alert_smtp_port: 587
alert_email_from: "alerts@wilkesliberty.com"
alert_email_to: "3@wilkesliberty.com"
# alert_smtp_user and alert_smtp_password should be in encrypted sso_secrets.yml:
#   alert_smtp_user: "your-smtp-user"
#   alert_smtp_password: "your-smtp-password"
# alert_slack_webhook_url: ""  # Optional — uncomment in sso_secrets.yml to enable Slack
