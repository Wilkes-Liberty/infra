# ── Domain Configuration ─────────────────────────────────────────────
domain: wilkesliberty.com
int_domain: int.wilkesliberty.com

# ── On-Prem Machine ───────────────────────────────────────────────────
# macOS username on the on-prem machine — used by the VPS cert sync script
# to SSH in as the correct user (not root).
onprem_user: jmcerda

# ── Network & Access Control ─────────────────────────────────────────
tailscale_network_cidr: "100.64.0.0/10"    # Tailscale mesh subnet
tailscale_split_dns_domain: "int.wilkesliberty.com"

# LAN subnet to advertise via Tailscale subnet router (on-prem only).
# References dns_reverse_cidr from network_secrets.yml (SOPS-encrypted).
tailscale_advertise_routes:
  - "{{ dns_reverse_cidr }}"

# Admin access: restrict SSH and admin UIs to these CIDRs
admin_allow_cidrs:
  - 203.0.113.0/24     # Replace with your Proton Business egress or office IPs
  - 203.0.113.10/32    # Replace with your specific admin IP

# ── Host Internal IP Addresses ────────────────────────────────────────
# Two-host architecture: on-prem server + Njalla VPS.
# All backend services run on on-prem; VPS is Caddy public ingress only.
#
# Network IPs are stored in network_secrets.yml (SOPS-encrypted).
# Edit with: sops ansible/inventory/group_vars/network_secrets.yml
#
# Variables defined there:
#   onprem_int_ip   — on-prem server LAN IP
#   coredns_ts_ip   — on-prem Tailscale IP (run `tailscale ip -4` after first `tailscale up`)
#   cloud_vps_ip    — Cloud VPS public IP (used in hosts.ini)
#
# ── Admin Device Internal IP Addresses ────────────────────────────────
# These are used by Caddyfile.internal.j2 to reverse-proxy device admin UIs
# at *.int.wilkesliberty.com over HTTPS (wildcard cert).
# Assign static leases on your router so these never drift.
#
# Variables defined in network_secrets.yml:
#   nas_int_ip / nas_admin_port         — Synology NAS (nas.int.wilkesliberty.com)
#   router_int_ip / router_admin_port   — AT&T router (router.int.wilkesliberty.com)
#   switch_int_ip / switch_admin_port   — TP-Link switch (switch.int.wilkesliberty.com)
#   printer_int_ip / printer_admin_port — Network printer (print.int.wilkesliberty.com)
#   uptime_int_ip / uptime_admin_port   — Uptime Kuma (uptime.int.wilkesliberty.com)

# ── Repository URLs ───────────────────────────────────────────────────
# webcms = Drupal CMS (headless backend) — built into the Drupal Docker image; serves api.wilkesliberty.com
# ui     = Next.js frontend — built into the Next.js Docker image; serves www.wilkesliberty.com
# Both repos are cloned at the 'staging' branch for the staging stack.
webcms_repo_url: "git@github.com:Wilkes-Liberty/webcms.git"
ui_repo_url: "git@github.com:Wilkes-Liberty/ui.git"
infra_repo_url: "git@github.com:Wilkes-Liberty/infra.git"

# ── Software Versions ─────────────────────────────────────────────────
php_version: "8.3"
node_major: "20"
solr_version: "9.6.1"
# Pinned Caddy version for custom binary (includes mholt/caddy-ratelimit plugin).
# To upgrade: bump this version and run make vps. The binary is replaced when
# http.handlers.rate_limit is absent from caddy list-modules output.
caddy_custom_version: "v2.11.2"

# ── Alert / Notification Settings ─────────────────────────────────────
# Used to render docker/alertmanager/config.yml.j2 via the wl-onprem role.
# Override SMTP secrets in an encrypted group_vars file (e.g. sso_secrets.yml).
alert_smtp_host: "smtp.protonmail.ch"
alert_smtp_port: 587
alert_email_from: "alerts@wilkesliberty.com"
alert_email_to: "3@wilkesliberty.com"
# alert_smtp_user and alert_smtp_password should be in encrypted sso_secrets.yml:
#   alert_smtp_user: "your-smtp-user"
#   alert_smtp_password: "your-smtp-password"
# alert_slack_webhook_url: ""  # Optional — uncomment in sso_secrets.yml to enable Slack

# ── Drupal SMTP (Postmark) ───────────────────────────────────────────
# Token + DKIM live in app_secrets.yml (SOPS-encrypted) as
# postmark_server_token. The wl-onprem role applies these to Drupal's
# smtp.settings on every deploy, so SMTP survives container recreation
# and config drift.
drupal_smtp_host: "smtp.postmarkapp.com"
drupal_smtp_port: 587
drupal_smtp_protocol: "tls"  # 'tls' = STARTTLS on 587
drupal_smtp_timeout: 10
drupal_smtp_from: "inquiry@wilkesliberty.com"
drupal_smtp_fromname: "Wilkes & Liberty"
