# Let's Encrypt Certificate Management - Default Variables

# Certificate configuration
letsencrypt_email: "admin@wilkesliberty.com"
letsencrypt_staging: false  # Set to true for testing, false for production
letsencrypt_key_size: 2048
letsencrypt_cert_dir: "/etc/letsencrypt"
letsencrypt_webroot_path: "/var/www/html"

# Challenge method
letsencrypt_challenge_method: "dns-01"  # DNS-01 required for wildcard certs
letsencrypt_dns_plugin: "njalla"        # Custom DNS plugin for Njalla

# Certificate configuration
# Single wildcard certificate covers all public subdomains and internal services.
# Obtained on the Njalla VPS via: certbot certonly --manual --preferred-challenges dns
#   -d "wilkesliberty.com" -d "*.wilkesliberty.com"
letsencrypt_certificates:
  - name: "wilkesliberty_wildcard"
    domains:
      - "wilkesliberty.com"
      - "*.wilkesliberty.com"
    challenge: "dns-01"
    services_to_restart:
      - caddy
    deploy_hook: "/etc/letsencrypt/renewal-hooks/deploy/reload-caddy.sh"
    description: "Wildcard certificate for all wilkesliberty.com subdomains"

# Renewal configuration
letsencrypt_renewal_frequency: "daily"
letsencrypt_renewal_time: "02:30"
letsencrypt_renewal_randomize: "1hour"

# Security settings
letsencrypt_force_renewal: false
letsencrypt_cert_permissions:
  mode: "0644"
  owner: "root"
  group: "ssl-cert"

# Key permissions (more restrictive)
letsencrypt_key_permissions:
  mode: "0600"
  owner: "root"
  group: "ssl-cert"

# Hooks and scripts
letsencrypt_pre_hook: ""
letsencrypt_post_hook: ""
letsencrypt_deploy_hook: ""

# Monitoring
letsencrypt_expiry_threshold: 30  # Days before expiry to alert
letsencrypt_enable_monitoring: true

# Backup configuration
letsencrypt_backup_certificates: true
letsencrypt_backup_dir: "/var/backups/letsencrypt"
letsencrypt_backup_retention: "30"  # Days to keep backups
