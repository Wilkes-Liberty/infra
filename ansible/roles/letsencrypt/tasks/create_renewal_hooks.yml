- name: Create SSO services restart hook
  copy:
    content: |
      #!/bin/bash
      # SSO services restart hook for Let's Encrypt
      # Restarts Authentik and related services
      
      LOG="/var/log/letsencrypt/renewal.log"
      
      echo "$(date): SSO services certificate renewed, restarting services..." >> $LOG
      
      # Restart web servers
      for service in nginx; do
          if systemctl is-active --quiet $service; then
              echo "$(date): Restarting $service..." >> $LOG
              systemctl reload $service && echo "$(date): $service reloaded successfully" >> $LOG || echo "$(date): Failed to reload $service" >> $LOG
          fi
      done
      
      # Restart Authentik services
      for service in authentik-server authentik-worker; do
          if systemctl is-active --quiet $service; then
              echo "$(date): Restarting $service..." >> $LOG
              systemctl restart $service && echo "$(date): $service restarted successfully" >> $LOG || echo "$(date): Failed to restart $service" >> $LOG
          fi
      done
      
      # If using Docker Compose for Authentik
      if [ -f "/opt/authentik/docker-compose.yml" ]; then
          echo "$(date): Restarting Authentik via Docker Compose..." >> $LOG
          cd /opt/authentik && docker-compose restart && echo "$(date): Authentik Docker services restarted" >> $LOG || echo "$(date): Failed to restart Authentik Docker services" >> $LOG
      fi
      
      echo "$(date): SSO services restart hook completed" >> $LOG
    dest: /etc/letsencrypt/renewal-hooks/deploy/restart-sso-services.sh
    mode: '0755'
    owner: root
    group: root
  become: yes

