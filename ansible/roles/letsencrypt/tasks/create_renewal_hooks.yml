---
# Create renewal hooks for Let's Encrypt certificate deployment

- name: Create log directory for renewal hooks
  file:
    path: /var/log/letsencrypt
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: yes

- name: Create Caddy reload hook
  copy:
    content: |
      #!/bin/bash
      # Renewal deploy hook: reload Caddy after certificate renewal
      # Installed at /etc/letsencrypt/renewal-hooks/deploy/reload-caddy.sh

      LOG="/var/log/letsencrypt/renewal.log"

      echo "$(date): Certificate renewed, reloading Caddy..." >> "$LOG"

      if systemctl is-active --quiet caddy; then
          systemctl reload caddy \
              && echo "$(date): Caddy reloaded successfully" >> "$LOG" \
              || echo "$(date): ERROR: Failed to reload Caddy" >> "$LOG"
      else
          echo "$(date): WARNING: Caddy is not running, skipping reload" >> "$LOG"
      fi

      echo "$(date): Renewal hook completed" >> "$LOG"
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-caddy.sh
    mode: '0755'
    owner: root
    group: root
  become: yes
