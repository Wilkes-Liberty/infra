---
# Create renewal hooks for different service types

- name: Create internal services restart hook
  copy:
    content: |
      #!/bin/bash
      # Internal services restart hook for Let's Encrypt
      # Restarts services that use internal certificates
      
      LOG="/var/log/letsencrypt/renewal.log"
      
      echo "$(date): Internal services certificate renewed, restarting services..." >> $LOG
      
      # Restart web servers if they exist
      for service in nginx apache2 caddy; do
          if systemctl is-active --quiet $service; then
              echo "$(date): Restarting $service..." >> $LOG
              systemctl reload $service && echo "$(date): $service reloaded successfully" >> $LOG || echo "$(date): Failed to reload $service" >> $LOG
          fi
      done
      
      # Update file permissions
      if [ -d "/etc/letsencrypt/live" ]; then
          find /etc/letsencrypt/live -name "fullchain.pem" -exec chmod 644 {} \;
          find /etc/letsencrypt/live -name "privkey.pem" -exec chmod 600 {} \;
          chgrp -R ssl-cert /etc/letsencrypt/live
      fi
      
      echo "$(date): Internal services restart hook completed" >> $LOG
    dest: /etc/letsencrypt/renewal-hooks/deploy/restart-internal-services.sh
    mode: '0755'
    owner: root
    group: root
  become: yes

- name: Create web services restart hook  
  copy:
    content: |
      #!/bin/bash
      # Web services restart hook for Let's Encrypt
      # Restarts services for main website
      
      LOG="/var/log/letsencrypt/renewal.log"
      
      echo "$(date): Web services certificate renewed, restarting services..." >> $LOG
      
      # Restart web servers
      for service in nginx caddy; do
          if systemctl is-active --quiet $service; then
              echo "$(date): Restarting $service..." >> $LOG
              systemctl reload $service && echo "$(date): $service reloaded successfully" >> $LOG || echo "$(date): Failed to reload $service" >> $LOG
          fi
      done
      
      # Restart Varnish cache if it exists
      if systemctl is-active --quiet varnish; then
          echo "$(date): Restarting varnish..." >> $LOG
          systemctl reload varnish && echo "$(date): varnish reloaded successfully" >> $LOG || echo "$(date): Failed to reload varnish" >> $LOG
      fi
      
      echo "$(date): Web services restart hook completed" >> $LOG
    dest: /etc/letsencrypt/renewal-hooks/deploy/restart-web-services.sh
    mode: '0755'
    owner: root
    group: root
  become: yes

