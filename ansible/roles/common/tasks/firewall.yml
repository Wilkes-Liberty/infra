---
# UFW firewall rules — two-host architecture
#
# on-prem: all services bind to localhost or Tailscale IP.
#          No public ports needed beyond SSH from admin CIDRs.
#          Tailscale handles all inter-host traffic.
#
# vps:     Public ingress (Caddy). Allows 80/443 publicly.
#          Tailscale handles back-channel to on-prem.

- name: Ensure UFW present
  apt:
    name: ufw
    state: present
    update_cache: yes

- name: Reset UFW to a clean state (idempotent)
  ufw:
    state: reset

- name: Set default policies (deny incoming, allow outgoing)
  ufw:
    direction: incoming
    policy: deny

- name: Ensure outgoing allowed
  ufw:
    direction: outgoing
    policy: allow

# ── SSH ──────────────────────────────────────────────────────────────
- name: Allow SSH from known admin CIDRs
  ufw:
    rule: allow
    port: '22'
    proto: tcp
    src: "{{ item }}"
  loop: "{{ admin_allow_cidrs }}"

- name: Allow SSH from Tailscale mesh
  ufw:
    rule: allow
    port: '22'
    proto: tcp
    src: "{{ tailscale_network_cidr }}"

# ── VPS: public HTTP/HTTPS (Caddy ingress) ───────────────────────────
- name: VPS | Allow HTTP/HTTPS publicly
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ['80', '443']
  when: "'vps' in group_names"

# ── ON-PREM: no public ports needed ─────────────────────────────────
# All services (Drupal :8080, Keycloak :8081, Solr :8983, Redis :6379,
# Prometheus :9090, Grafana :3000, Uptime Kuma :3001) bind to
# localhost or the Tailscale IP — UFW does not need to open them.
# Tailscale itself uses UDP 41641 outbound (permitted by allow outgoing).

# ── Enable/Reload ────────────────────────────────────────────────────
- name: Enable UFW
  ufw:
    state: enabled

- name: Show UFW status (debug)
  command: ufw status numbered
  register: ufw_status
  changed_when: false

- debug:
    var: ufw_status.stdout_lines
