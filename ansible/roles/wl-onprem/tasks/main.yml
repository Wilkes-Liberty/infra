---
# wl-onprem role
# Purpose: Deploy and manage the on-prem server
# Architecture:
#   - Outer layer: Proton VPN (kill-switch + always-on — enforced client-side)
#   - Inner layer: Tailscale (private mesh network — 100.64.0.0/10)
#   - Docker Compose stack: 11 containers (Drupal, PostgreSQL, Redis, Keycloak, Solr, monitoring)
#   - Automated backups with retention management
#   - Enterprise monitoring with Prometheus/Grafana/Alertmanager

# ============================================================================
# PHASE 1: PREREQUISITES
# ============================================================================

- name: Install Homebrew if missing
  command: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    creates: /opt/homebrew/bin/brew

- name: Check if Docker is already installed
  command: which docker
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install Docker Desktop
  community.general.homebrew_cask:
    name: docker
    state: present
  when: docker_check.rc != 0

- name: Wait for Docker to be available
  wait_for:
    path: /var/run/docker.sock
    timeout: 60

# ============================================================================
# PHASE 2: DIRECTORY STRUCTURE
# ============================================================================

- name: Create backup directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/daily"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/weekly"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/monthly"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/encrypted"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/logs"

- name: Create Docker data directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/nas_docker"
    - "{{ ansible_env.HOME }}/nas_docker/drupal"
    - "{{ ansible_env.HOME }}/nas_docker/postgres"
    - "{{ ansible_env.HOME }}/nas_docker/redis"
    - "{{ ansible_env.HOME }}/nas_docker/keycloak"
    - "{{ ansible_env.HOME }}/nas_docker/solr"
    - "{{ ansible_env.HOME }}/nas_docker/prometheus"
    - "{{ ansible_env.HOME }}/nas_docker/prometheus/data"
    - "{{ ansible_env.HOME }}/nas_docker/grafana"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/datasources"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/dashboards"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/dashboards"
    - "{{ ansible_env.HOME }}/nas_docker/alertmanager"
    - "{{ ansible_env.HOME }}/Scripts"

# ============================================================================
# PHASE 3: CONFIGURATION FILES
# ============================================================================

- name: Render .env from SOPS-backed template
  # All secrets are injected by community.sops.load_vars in onprem.yml pre_tasks.
  # After Drupal is installed: populate app_secrets.yml and re-run make onprem
  # to fill DRUPAL_CLIENT_ID / DRUPAL_CLIENT_SECRET / DRUPAL_REVALIDATE_SECRET / DRUPAL_PREVIEW_SECRET.
  template:
    src: ../../../../docker/.env.j2
    dest: "{{ ansible_env.HOME }}/nas_docker/.env"
    mode: '0600'

- name: Deploy Grafana Prometheus datasource
  copy:
    dest: "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/datasources/prometheus.yml"
    content: |
      apiVersion: 1
      
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false
          jsonData:
            timeInterval: 15s
    mode: '0644'

- name: Deploy Grafana dashboard provisioning
  copy:
    dest: "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/dashboards/dashboards.yml"
    content: |
      apiVersion: 1
      
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          updateIntervalSeconds: 10
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards
    mode: '0644'

- name: Deploy docker-compose.yml
  copy:
    src: ../../../../docker/docker-compose.yml
    dest: "{{ ansible_env.HOME }}/nas_docker/docker-compose.yml"
    mode: '0644'

- name: Copy Prometheus configuration
  copy:
    src: ../../../../docker/prometheus/
    dest: "{{ ansible_env.HOME }}/nas_docker/prometheus/"
    mode: '0644'

- name: Create alertmanager data directory
  file:
    path: "{{ ansible_env.HOME }}/nas_docker/alertmanager/data"
    state: directory
    mode: '0755'

- name: Render Alertmanager configuration from template
  # The config.yml.j2 template uses Ansible variables for SMTP/Slack settings.
  # Shell-style ${VAR} syntax is NOT supported by Alertmanager directly.
  # Variables are defined in group_vars/all.yml and encrypted sso_secrets.yml.
  template:
    src: ../../../../docker/alertmanager/config.yml.j2
    dest: "{{ ansible_env.HOME }}/nas_docker/alertmanager/config.yml"
    mode: '0640'

# ============================================================================
# PHASE 4: BACKUP AUTOMATION
# ============================================================================

- name: Deploy backup script
  copy:
    src: ../../../../scripts/backup-onprem.sh
    dest: "{{ ansible_env.HOME }}/Scripts/backup-onprem.sh"
    mode: '0755'

- name: Create launchd backup plist
  template:
    src: com.wilkesliberty.backup.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.wilkesliberty.backup.plist"
    mode: '0644'

- name: Load launchd backup agent
  command: launchctl load "{{ ansible_env.HOME }}/Library/LaunchAgents/com.wilkesliberty.backup.plist"
  args:
    creates: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.wilkesliberty.backup.plist"
  ignore_errors: true

# ============================================================================
# PHASE 5: VPN & NETWORKING
# ============================================================================

# ── Tailscale ─────────────────────────────────────────────────────────────────

- name: Check if Tailscale is already installed
  command: which tailscale
  register: tailscale_onprem_check
  changed_when: false
  failed_when: false

- name: Install Tailscale (inner private mesh)
  community.general.homebrew_cask:
    name: tailscale
    state: present
  when: tailscale_onprem_check.rc != 0

- name: Check if Tailscale CLI is available
  command: which tailscale
  register: tailscale_cli_check
  changed_when: false
  failed_when: false

- name: Check Tailscale connection status
  command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false
  when: tailscale_cli_check.rc == 0

- name: Connect to Tailscale network (if not already connected)
  command: >-
    tailscale up
    --authkey={{ tailscale_auth_key }}
    --hostname=wilkesliberty-onprem
    --advertise-routes={{ tailscale_advertise_routes | join(',') }}
    --accept-routes
    --accept-dns=false
  no_log: true
  when:
    - tailscale_cli_check.rc == 0
    - >
      tailscale_status.rc != 0 or
      'Logged out' in (tailscale_status.stdout | default('')) or
      'Logged out' in (tailscale_status.stderr | default(''))

# ── CoreDNS ───────────────────────────────────────────────────────────────────

- name: Install CoreDNS
  community.general.homebrew:
    name: coredns
    state: present

- name: Create CoreDNS config directory
  file:
    path: /opt/homebrew/etc/coredns
    state: directory
    mode: '0755'

- name: Deploy Corefile
  template:
    src: Corefile.j2
    dest: /opt/homebrew/etc/coredns/Corefile
    mode: '0644'
  register: coredns_corefile

- name: Deploy int.wilkesliberty.com zone file
  template:
    src: int.wilkesliberty.com.zone.j2
    dest: /opt/homebrew/etc/coredns/int.wilkesliberty.com.zone
    mode: '0644'
  register: coredns_zonefile

- name: Deploy CoreDNS LaunchDaemon plist
  template:
    src: com.wilkesliberty.coredns.plist.j2
    dest: /Library/LaunchDaemons/com.wilkesliberty.coredns.plist
    mode: '0644'
  become: true
  register: coredns_plist

- name: Check if CoreDNS LaunchDaemon is already loaded
  command: launchctl list com.wilkesliberty.coredns
  register: coredns_loaded
  changed_when: false
  failed_when: false
  become: true

- name: Load CoreDNS LaunchDaemon (first run)
  command: launchctl bootstrap system /Library/LaunchDaemons/com.wilkesliberty.coredns.plist
  become: true
  when: coredns_loaded.rc != 0

- name: Restart CoreDNS if config changed
  command: launchctl kickstart -k system/com.wilkesliberty.coredns
  become: true
  when:
    - coredns_loaded.rc == 0
    - coredns_corefile.changed or coredns_zonefile.changed or coredns_plist.changed

- name: Create /etc/resolver directory
  file:
    path: /etc/resolver
    state: directory
    mode: '0755'
  become: true

- name: Configure macOS resolver for int.wilkesliberty.com
  copy:
    content: "nameserver {{ coredns_listen_ip }}\n"
    dest: /etc/resolver/int.wilkesliberty.com
    mode: '0644'
  become: true

- name: Verify CoreDNS is responding
  command: >
    dig +short +time=3 +tries=1 @{{ coredns_listen_ip }} ns1.int.wilkesliberty.com
  register: coredns_verify
  changed_when: false
  failed_when: coredns_verify.rc != 0 and coredns_verify.stdout == ''
  retries: 5
  delay: 2

- name: Remind operator to configure Split DNS in Tailscale admin console
  debug:
    msg:
      - "⚠️  ACTION REQUIRED — configure Split DNS manually (one-time, if not already done):"
      - "   https://login.tailscale.com/admin/dns"
      - "   Under 'Nameservers' → 'Add nameserver' → 'Custom'"
      - "   Domain: {{ tailscale_split_dns_domain }}"
      - "   Nameserver: {{ coredns_listen_ip }} (on-prem Tailscale IP)"
  when: tailscale_cli_check.rc == 0

- name: Remind operator of required manual steps after first Tailscale install
  debug:
    msg:
      - "⚠️  If this is a fresh Tailscale install, two manual steps are required:"
      - "   1. Approve the network extension:"
      - "      System Settings → Privacy & Security → Network Extensions → Allow Tailscale"
      - "   2. Approve subnet routes in Tailscale admin console:"
      - "      https://login.tailscale.com/admin/machines"
      - "      Find 'wilkesliberty-onprem' → Edit → Subnets → Approve: {{ tailscale_advertise_routes | join(', ') }}"
  when: tailscale_cli_check.rc == 0

# ── Internal Caddy ────────────────────────────────────────────────────────────

- name: Install Caddy
  community.general.homebrew:
    name: caddy
    state: present

- name: Create Caddy config and log directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/homebrew/etc/caddy
    - /var/log/caddy
  become: true

- name: Create /etc/letsencrypt/live/int.wilkesliberty.com directory (populated by make vps sync)
  file:
    path: /etc/letsencrypt/live/int.wilkesliberty.com
    state: directory
    mode: '0755'
    owner: "{{ ansible_env.USER }}"
    group: staff
  become: true

- name: Allow jmcerda to reload Caddy without password (used by cert sync hook)
  copy:
    content: |
      {{ ansible_env.USER }} ALL=(ALL) NOPASSWD: /usr/bin/pkill -HUP caddy
    dest: /etc/sudoers.d/wilkesliberty-certsync
    mode: '0440'
    validate: visudo -cf %s
  become: true

- name: Check if *.int.wilkesliberty.com cert exists
  stat:
    path: /etc/letsencrypt/live/int.wilkesliberty.com/fullchain.pem
  register: int_cert

- name: Warn if cert is missing (run make vps first to obtain and sync it)
  debug:
    msg:
      - "⚠️  WARNING — /etc/letsencrypt/live/int.wilkesliberty.com/fullchain.pem not found."
      - "   Internal Caddy will not start until the cert is synced from the VPS."
      - "   Run 'make vps' to obtain the *.int.wilkesliberty.com cert and sync it here."
  when: not int_cert.stat.exists

- name: Deploy internal Caddyfile
  template:
    src: Caddyfile.internal.j2
    dest: /opt/homebrew/etc/caddy/Caddyfile.internal
    mode: '0644'
  become: true
  register: caddy_internal_config

- name: Deploy internal Caddy LaunchDaemon plist
  template:
    src: com.wilkesliberty.caddy-internal.plist.j2
    dest: /Library/LaunchDaemons/com.wilkesliberty.caddy-internal.plist
    mode: '0644'
  become: true
  register: caddy_internal_plist

- name: Check if internal Caddy LaunchDaemon is already loaded
  command: launchctl list com.wilkesliberty.caddy-internal
  register: caddy_internal_loaded
  changed_when: false
  failed_when: false
  become: true

- name: Load internal Caddy LaunchDaemon (first run, cert present)
  command: launchctl bootstrap system /Library/LaunchDaemons/com.wilkesliberty.caddy-internal.plist
  become: true
  when:
    - caddy_internal_loaded.rc != 0
    - int_cert.stat.exists

- name: Restart internal Caddy if config changed
  command: launchctl kickstart -k system/com.wilkesliberty.caddy-internal
  become: true
  when:
    - caddy_internal_loaded.rc == 0
    - int_cert.stat.exists
    - caddy_internal_config.changed or caddy_internal_plist.changed

# ── Proton VPN ────────────────────────────────────────────────────────────────

- name: Check if Proton VPN is already installed
  stat:
    path: /Applications/ProtonVPN.app
  register: protonvpn_check

- name: Install Proton VPN (outer kill-switch)
  community.general.homebrew_cask:
    name: protonvpn
    state: present
  when: not protonvpn_check.stat.exists

# ============================================================================
# PHASE 6: DOCKER DEPLOYMENT
# ============================================================================

- name: Pull Docker images
  command: docker compose --env-file {{ ansible_env.HOME }}/nas_docker/.env pull
  args:
    chdir: "{{ ansible_env.HOME }}/Repositories/infra/docker"

- name: Check if Docker Compose stack is running
  command: docker compose --env-file {{ ansible_env.HOME }}/nas_docker/.env ps -q
  args:
    chdir: "{{ ansible_env.HOME }}/Repositories/infra/docker"
  register: compose_ps
  changed_when: false
  failed_when: false

- name: Stop existing Docker Compose stack (ensures clean port binding on redeploy)
  command: docker compose --env-file {{ ansible_env.HOME }}/nas_docker/.env down
  args:
    chdir: "{{ ansible_env.HOME }}/Repositories/infra/docker"
  when: compose_ps.stdout | length > 0

- name: Start Docker Compose stack
  command: docker compose --env-file {{ ansible_env.HOME }}/nas_docker/.env up -d
  args:
    chdir: "{{ ansible_env.HOME }}/Repositories/infra/docker"

- name: Wait for services to be healthy
  pause:
    seconds: 30

- name: Check Docker service status
  command: docker compose --env-file {{ ansible_env.HOME }}/nas_docker/.env ps
  args:
    chdir: "{{ ansible_env.HOME }}/Repositories/infra/docker"
  register: docker_status
  changed_when: false

- name: Display Docker service status
  debug:
    var: docker_status.stdout_lines

# ============================================================================
# POST-DEPLOY: RESET DB PASSWORDS + DRUPAL SMTP CONFIG
# ============================================================================
# When the Drupal container is recreated, .env may contain a fresh password
# but Postgres' data directory persists with the OLD password. Reset both
# drupal and keycloak roles to match the env values. Idempotent.

- name: Wait for Postgres to be healthy
  command: docker exec wl_postgres pg_isready -U drupal -d drupal
  register: pg_ready
  retries: 12
  delay: 5
  until: pg_ready.rc == 0
  changed_when: false
  failed_when: false

- name: Reset Postgres role passwords to match container env (drupal, keycloak)
  shell: |
    set -e
    DRUPAL_PW=$(docker exec wl_drupal env | sed -n 's/^DRUPAL_DB_PASSWORD=//p')
    KC_PW=$(docker exec wl_postgres env | sed -n 's/^KEYCLOAK_DB_PASSWORD=//p')
    if [ -n "$DRUPAL_PW" ]; then
      docker exec wl_postgres psql -U drupal -d drupal -c "ALTER USER drupal WITH PASSWORD '$DRUPAL_PW';" >/dev/null
    fi
    if [ -n "$KC_PW" ]; then
      docker exec wl_postgres psql -U drupal -d drupal -c "ALTER USER keycloak WITH PASSWORD '$KC_PW';" >/dev/null
    fi
    echo "passwords synced"
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true
  when: pg_ready.rc == 0

# ============================================================================
# DRUPAL SMTP CONFIGURATION (Postmark)
# ============================================================================
# Apply SMTP settings to Drupal's smtp.settings config so transactional email
# (contact form notifications, password resets, etc.) is delivered via Postmark.
# Idempotent: re-runs do nothing if the settings already match.

- name: Ensure PHP memory_limit is high enough in Drupal container
  # Older images shipped with 128M default which OOMs on drush cr / cim.
  # Newer Dockerfile.prod sets this in /usr/local/etc/php/conf.d/zz-drupal.ini
  # at build time — this task is a safety net for older images.
  shell: |
    docker exec wl_drupal bash -c '
      F=/usr/local/etc/php/conf.d/zz-drupal.ini
      if ! grep -q "memory_limit = 512M" $F 2>/dev/null; then
        echo "memory_limit = 512M" >> $F
      fi
    '
  args:
    executable: /bin/bash
  changed_when: false

- name: Wait for Drupal container to be reachable via drush
  command: docker exec wl_drupal drush status --fields=db-status --format=string
  register: drupal_status
  retries: 12
  delay: 5
  until: drupal_status.rc == 0 and 'Connected' in drupal_status.stdout
  changed_when: false
  failed_when: false

- name: Configure Drupal SMTP for Postmark (host/port/protocol/from)
  command: >-
    docker exec wl_drupal drush config:set -y smtp.settings {{ item.key }} {{ item.value | quote }}
  loop:
    - { key: smtp_on, value: "true" }
    - { key: smtp_host, value: "{{ drupal_smtp_host }}" }
    - { key: smtp_hostbackup, value: "" }
    - { key: smtp_port, value: "{{ drupal_smtp_port }}" }
    - { key: smtp_protocol, value: "{{ drupal_smtp_protocol }}" }
    - { key: smtp_autotls, value: "true" }
    - { key: smtp_timeout, value: "{{ drupal_smtp_timeout }}" }
    - { key: smtp_from, value: "{{ drupal_smtp_from }}" }
    - { key: smtp_fromname, value: "{{ drupal_smtp_fromname }}" }
  changed_when: false  # drush config:set always reports change; treat as idempotent
  when: drupal_status.rc == 0

- name: Configure Drupal SMTP credentials (Postmark token)
  # Pass token via docker env so it doesn't appear in `ps` or Ansible logs.
  # drush php:eval reads $PM_TOKEN from the container environment and writes
  # it to smtp.settings. Token never appears in the command line or output.
  command:
    argv:
      - docker
      - exec
      - -e
      - "PM_TOKEN={{ postmark_server_token }}"
      - wl_drupal
      - drush
      - php:eval
      - |
        $t = getenv('PM_TOKEN');
        $c = \Drupal::configFactory()->getEditable('smtp.settings');
        $c->set('smtp_username', $t)->set('smtp_password', $t)->save();
  no_log: true
  changed_when: false
  when:
    - drupal_status.rc == 0
    - postmark_server_token is defined
    - postmark_server_token | length > 0

- name: Rebuild Drupal cache after SMTP config change
  command: docker exec wl_drupal drush cr
  changed_when: false
  when: drupal_status.rc == 0

# ============================================================================
# PHASE 7: STAGING ENVIRONMENT
# ============================================================================
# Staging runs on the same on-prem server alongside production.
# Source branch: 'staging'
# Repos: ~/Repositories/staging/{infra,webcms,ui}
# Stack:  ~/nas_docker_staging/

- name: Create staging directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/Repositories/staging"
    - "{{ ansible_env.HOME }}/nas_docker_staging"
    - "{{ ansible_env.HOME }}/nas_docker_staging/drupal/files"
    - "{{ ansible_env.HOME }}/nas_docker_staging/drupal/private"
    - "{{ ansible_env.HOME }}/nas_docker_staging/postgres"
    - "{{ ansible_env.HOME }}/nas_docker_staging/redis"
    - "{{ ansible_env.HOME }}/nas_docker_staging/keycloak"
    - "{{ ansible_env.HOME }}/nas_docker_staging/solr"

# Clone repos at the 'staging' branch into ~/Repositories/staging/
# If the repo already exists, switch to the staging branch and pull.
- name: Clone or update webcms repo at staging branch
  git:
    repo: "{{ webcms_repo_url }}"
    dest: "{{ ansible_env.HOME }}/Repositories/staging/webcms"
    version: "staging"
    update: true
    force: true
  when: webcms_repo_url is defined

- name: Clone or update ui repo at staging branch
  git:
    repo: "{{ ui_repo_url }}"
    dest: "{{ ansible_env.HOME }}/Repositories/staging/ui"
    version: "staging"
    update: true
    force: true
  when: ui_repo_url is defined

- name: Check if staging infra is a symlink
  stat:
    path: "{{ ansible_env.HOME }}/Repositories/staging/infra"
  register: staging_infra_stat

- name: Remove legacy infra symlink if present
  file:
    path: "{{ ansible_env.HOME }}/Repositories/staging/infra"
    state: absent
  when: staging_infra_stat.stat.exists and staging_infra_stat.stat.islnk

- name: Clone or update infra repo at staging branch
  git:
    repo: "{{ infra_repo_url }}"
    dest: "{{ ansible_env.HOME }}/Repositories/staging/infra"
    version: "staging"
    update: true
    force: true
  when: infra_repo_url is defined

- name: Render staging .env from SOPS-backed template
  # All staging secrets are injected by community.sops.load_vars in onprem.yml pre_tasks.
  # After staging Drupal is installed: populate staging_secrets.yml and re-run make onprem
  # to fill STG_DRUPAL_CLIENT_ID / STG_DRUPAL_CLIENT_SECRET / STG_DRUPAL_REVALIDATE_SECRET.
  template:
    src: ../../../../docker/.env.staging.j2
    dest: "{{ ansible_env.HOME }}/nas_docker_staging/.env"
    mode: '0600'

- name: Render staging docker-compose from template
  template:
    src: ../../../../docker/docker-compose.staging.yml.j2
    dest: "{{ ansible_env.HOME }}/nas_docker_staging/docker-compose.yml"
    mode: '0644'

- name: Pull staging Docker images
  command: docker compose pull
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker_staging"
  when: webcms_repo_url is defined

- name: Start staging Docker Compose stack
  command: docker compose up -d --build
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker_staging"
  when: webcms_repo_url is defined

- name: Check staging Docker service status
  command: docker compose ps
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker_staging"
  register: staging_docker_status
  changed_when: false
  when: webcms_repo_url is defined

- name: Display staging Docker service status
  debug:
    var: staging_docker_status.stdout_lines
  when: webcms_repo_url is defined

# ============================================================================
# PHASE 8: POST-DEPLOYMENT VALIDATION
# ============================================================================

- name: Display deployment summary
  debug:
    msg:
      - "✅ WilkesLiberty On-Prem Server Deployed Successfully!"
      - ""
      - "🌐 Public URLs (via Njalla VPS Caddy → on-prem Tailscale):"
      - "   - Frontend:     https://www.wilkesliberty.com        (Next.js — ui repo, runs on VPS)"
      - "   - Drupal API:   https://api.wilkesliberty.com        (Drupal CMS — webcms repo, on-prem:8080)"
      - "   - SSO:          https://auth.wilkesliberty.com       (Keycloak, on-prem:8081)"
