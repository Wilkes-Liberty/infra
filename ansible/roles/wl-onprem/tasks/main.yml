---
# wl-onprem role
# Purpose: Deploy and manage the on-prem Mac Mini server (primary private server)
# Architecture:
#   - Outer layer: Proton VPN (kill-switch + always-on — enforced client-side)
#   - Inner layer: Tailscale (private mesh network — 100.64.0.0/10)
#   - All traffic from Njalla VPS or consultants must go through Proton VPN first
#   - Docker services (Drupal 11, Keycloak, ClickHouse, etc.) run locally on the 4TB Synology SSD

- name: Install Homebrew if missing
  command: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    creates: /opt/homebrew/bin/brew

- name: Install Docker Desktop
  homebrew_cask:
    name: docker
    state: present

- name: Set Docker resource limits (GPU-safe)
  lineinfile:
    path: ~/Library/Group Containers/group.com.docker/settings.json
    regexp: '"memoryMiB"'
    line: '  "memoryMiB": 32768,'
  notify: Restart Docker Desktop

- name: Ensure nas_docker directory exists
  file:
    path: ~/nas_docker
    state: directory
    mode: '0755'

- name: Deploy docker-compose.yml from repo
  copy:
    src: ../../docker/docker-compose.yml
    dest: ~/nas_docker/docker-compose.yml
    mode: '0644'

- name: Start Docker services
  command: docker compose -f ~/nas_docker/docker-compose.yml up -d
  args:
    chdir: ~/nas_docker

- name: Install Tailscale (inner private mesh)
  homebrew_cask:
    name: tailscale
    state: present

- name: Install Proton VPN (outer kill-switch)
  homebrew_cask:
    name: protonvpn
    state: present

- name: Deploy CCC pause script
  template:
    src: ccc-pause.sh.j2
    dest: ~/Scripts/ccc-pause.sh
    mode: '0755'

- name: Deploy CCC restart script
  template:
    src: ccc-restart.sh.j2
    dest: ~/Scripts/ccc-restart.sh
    mode: '0755'

- name: Deploy daily backup cron (Proton + iCloud)
  cron:
    name: "Daily encrypted backups"
    minute: "0"
    hour: "4"
    job: "~/Scripts/backup-to-cloud.sh"