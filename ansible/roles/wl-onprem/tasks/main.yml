---
# wl-onprem role
# Purpose: Deploy and manage the on-prem server
# Architecture:
#   - Outer layer: Proton VPN (kill-switch + always-on — enforced client-side)
#   - Inner layer: Tailscale (private mesh network — 100.64.0.0/10)
#   - Docker Compose stack: 11 containers (Drupal, PostgreSQL, Redis, Keycloak, Solr, monitoring)
#   - Automated backups with retention management
#   - Enterprise monitoring with Prometheus/Grafana/Alertmanager

# ============================================================================
# PHASE 1: PREREQUISITES
# ============================================================================

- name: Install Homebrew if missing
  command: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    creates: /opt/homebrew/bin/brew

- name: Install Docker Desktop
  community.general.homebrew_cask:
    name: docker
    state: present

- name: Wait for Docker to be available
  wait_for:
    path: /var/run/docker.sock
    timeout: 60

# ============================================================================
# PHASE 2: DIRECTORY STRUCTURE
# ============================================================================

- name: Create backup directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/daily"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/weekly"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/monthly"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/encrypted"
    - "{{ ansible_env.HOME }}/Backups/wilkesliberty/logs"

- name: Create Docker data directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/nas_docker"
    - "{{ ansible_env.HOME }}/nas_docker/drupal"
    - "{{ ansible_env.HOME }}/nas_docker/postgres"
    - "{{ ansible_env.HOME }}/nas_docker/redis"
    - "{{ ansible_env.HOME }}/nas_docker/keycloak"
    - "{{ ansible_env.HOME }}/nas_docker/solr"
    - "{{ ansible_env.HOME }}/nas_docker/prometheus"
    - "{{ ansible_env.HOME }}/nas_docker/prometheus/data"
    - "{{ ansible_env.HOME }}/nas_docker/grafana"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/datasources"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/dashboards"
    - "{{ ansible_env.HOME }}/nas_docker/grafana/dashboards"
    - "{{ ansible_env.HOME }}/nas_docker/alertmanager"
    - "{{ ansible_env.HOME }}/Scripts"

# ============================================================================
# PHASE 3: CONFIGURATION FILES
# ============================================================================

- name: Check if .env already exists
  stat:
    path: "{{ ansible_env.HOME }}/nas_docker/.env"
  register: env_file

- name: Copy .env.example if .env doesn't exist
  copy:
    src: ../../../../docker/.env.example
    dest: "{{ ansible_env.HOME }}/nas_docker/.env"
    mode: '0600'
  when: not env_file.stat.exists

- name: Generate random passwords for .env (if new)
  shell: openssl rand -base64 32
  register: generated_password
  changed_when: false
  when: not env_file.stat.exists

- name: Display .env reminder
  debug:
    msg:
      - "⚠️  IMPORTANT: Configure passwords in ~/nas_docker/.env"
      - "   Edit the file and set:"
      - "   - DRUPAL_DB_PASSWORD"
      - "   - KEYCLOAK_ADMIN_PASSWORD"
      - "   - GRAFANA_ADMIN_PASSWORD"
      - "   - BACKUP_ENCRYPTION_KEY"
      - "   - SMTP settings (optional)"
  when: not env_file.stat.exists

- name: Deploy Grafana Prometheus datasource
  copy:
    dest: "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/datasources/prometheus.yml"
    content: |
      apiVersion: 1
      
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false
          jsonData:
            timeInterval: 15s
    mode: '0644'

- name: Deploy Grafana dashboard provisioning
  copy:
    dest: "{{ ansible_env.HOME }}/nas_docker/grafana/provisioning/dashboards/dashboards.yml"
    content: |
      apiVersion: 1
      
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          updateIntervalSeconds: 10
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards
    mode: '0644'

- name: Deploy docker-compose.yml
  copy:
    src: ../../../../docker/docker-compose.yml
    dest: "{{ ansible_env.HOME }}/nas_docker/docker-compose.yml"
    mode: '0644'

- name: Copy Prometheus configuration
  copy:
    src: ../../../../docker/prometheus/
    dest: "{{ ansible_env.HOME }}/nas_docker/prometheus/"
    mode: '0644'

- name: Create alertmanager data directory
  file:
    path: "{{ ansible_env.HOME }}/nas_docker/alertmanager/data"
    state: directory
    mode: '0755'

- name: Render Alertmanager configuration from template
  # The config.yml.j2 template uses Ansible variables for SMTP/Slack settings.
  # Shell-style ${VAR} syntax is NOT supported by Alertmanager directly.
  # Variables are defined in group_vars/all.yml and encrypted sso_secrets.yml.
  template:
    src: ../../../../docker/alertmanager/config.yml.j2
    dest: "{{ ansible_env.HOME }}/nas_docker/alertmanager/config.yml"
    mode: '0640'

# ============================================================================
# PHASE 4: BACKUP AUTOMATION
# ============================================================================

- name: Deploy backup script
  copy:
    src: ../../../../scripts/backup-onprem.sh
    dest: "{{ ansible_env.HOME }}/Scripts/backup-onprem.sh"
    mode: '0755'

- name: Create launchd backup plist
  template:
    src: com.wilkesliberty.backup.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.wilkesliberty.backup.plist"
    mode: '0644'

- name: Load launchd backup agent
  command: launchctl load "{{ ansible_env.HOME }}/Library/LaunchAgents/com.wilkesliberty.backup.plist"
  args:
    creates: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.wilkesliberty.backup.plist"
  ignore_errors: true

# ============================================================================
# PHASE 5: VPN & NETWORKING
# ============================================================================

- name: Install Tailscale (inner private mesh)
  community.general.homebrew_cask:
    name: tailscale
    state: present

- name: Install Proton VPN (outer kill-switch)
  community.general.homebrew_cask:
    name: protonvpn
    state: present

# ============================================================================
# PHASE 6: DOCKER DEPLOYMENT
# ============================================================================

- name: Pull Docker images
  command: docker compose pull
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker"

- name: Start Docker Compose stack
  command: docker compose up -d
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker"

- name: Wait for services to be healthy
  pause:
    seconds: 30

- name: Check Docker service status
  command: docker compose ps
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker"
  register: docker_status
  changed_when: false

- name: Display Docker service status
  debug:
    var: docker_status.stdout_lines

# ============================================================================
# PHASE 7: STAGING ENVIRONMENT
# ============================================================================
# Staging runs on the same on-prem server alongside production.
# Source branch: 'staging'
# Repos: ~/Repositories/staging/{infra,webcms,ui}
# Stack:  ~/nas_docker_staging/

- name: Create staging directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/Repositories/staging"
    - "{{ ansible_env.HOME }}/nas_docker_staging"
    - "{{ ansible_env.HOME }}/nas_docker_staging/drupal/files"
    - "{{ ansible_env.HOME }}/nas_docker_staging/drupal/private"
    - "{{ ansible_env.HOME }}/nas_docker_staging/postgres"
    - "{{ ansible_env.HOME }}/nas_docker_staging/redis"
    - "{{ ansible_env.HOME }}/nas_docker_staging/keycloak"
    - "{{ ansible_env.HOME }}/nas_docker_staging/solr"

# Clone repos at the 'staging' branch into ~/Repositories/staging/
# If the repo already exists, switch to the staging branch and pull.
- name: Clone or update webcms repo at staging branch
  git:
    repo: "{{ webcms_repo_url }}"
    dest: "{{ ansible_env.HOME }}/Repositories/staging/webcms"
    version: "staging"
    update: true
    force: false
  when: webcms_repo_url is defined

- name: Clone or update ui repo at staging branch
  git:
    repo: "{{ ui_repo_url }}"
    dest: "{{ ansible_env.HOME }}/Repositories/staging/ui"
    version: "staging"
    update: true
    force: false
  when: ui_repo_url is defined

- name: Symlink infra repo into staging directory (shared — not branched separately)
  file:
    src: "{{ ansible_env.HOME }}/Repositories/infra"
    dest: "{{ ansible_env.HOME }}/Repositories/staging/infra"
    state: link
    force: false

- name: Check if staging .env already exists
  stat:
    path: "{{ ansible_env.HOME }}/nas_docker_staging/.env"
  register: staging_env_file

- name: Copy staging .env.example if .env doesn't exist
  copy:
    src: ../../../../docker/.env.staging.example
    dest: "{{ ansible_env.HOME }}/nas_docker_staging/.env"
    mode: '0600'
  when: not staging_env_file.stat.exists

- name: Display staging .env reminder
  debug:
    msg:
      - "⚠️  IMPORTANT: Configure staging passwords in ~/nas_docker_staging/.env"
      - "   All variables are prefixed STG_ — see docker/.env.staging.example"
  when: not staging_env_file.stat.exists

- name: Render staging docker-compose from template
  template:
    src: ../../../../docker/docker-compose.staging.yml.j2
    dest: "{{ ansible_env.HOME }}/nas_docker_staging/docker-compose.yml"
    mode: '0644'

- name: Pull staging Docker images
  command: docker compose pull
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker_staging"
  when: webcms_repo_url is defined

- name: Start staging Docker Compose stack
  command: docker compose up -d --build
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker_staging"
  when: webcms_repo_url is defined

- name: Check staging Docker service status
  command: docker compose ps
  args:
    chdir: "{{ ansible_env.HOME }}/nas_docker_staging"
  register: staging_docker_status
  changed_when: false
  when: webcms_repo_url is defined

- name: Display staging Docker service status
  debug:
    var: staging_docker_status.stdout_lines
  when: webcms_repo_url is defined

# ============================================================================
# PHASE 8: POST-DEPLOYMENT VALIDATION
# ============================================================================

- name: Display deployment summary
  debug:
    msg:
      - "✅ WilkesLiberty On-Prem Server Deployed Successfully!"
      - ""
      - "📊 Production URLs (internal HTTPS via Caddy):"
      - "   - Drupal:       https://app.int.wilkesliberty.com"
      - "   - Keycloak SSO: https://sso.int.wilkesliberty.com"
      - "   - Solr:         https://search.int.wilkesliberty.com  (admin CIDRs only)"
      - "   - Grafana:      https://monitor.int.wilkesliberty.com"
      - "   - Prometheus:   https://prometheus.int.wilkesliberty.com  (admin CIDRs only)"
      - "   - Alertmanager: https://alerts.int.wilkesliberty.com  (admin CIDRs only)"
      - "   - Uptime Kuma:  https://uptime.int.wilkesliberty.com"
      - ""
      - "🖥️  Admin Device URLs:"
      - "   - NAS:          https://nas.int.wilkesliberty.com"
      - "   - Router:       https://router.int.wilkesliberty.com"
      - "   - Switch:       https://switch.int.wilkesliberty.com"
      - "   - Printer:      https://printer.int.wilkesliberty.com"
      - "   ⚠️  Update device IPs in group_vars/all.yml and coredns zone before use"
      - ""
      - "🧪 Staging URLs (staging branch):"
      - "   - Drupal:       http://localhost:8090"
      - "   - Keycloak:     http://localhost:8091"
      - "   - Next.js:      http://localhost:3010"
      - "   - Solr:         http://localhost:8993"
      - ""
      - "📋 Next Steps:"
      - "   1. Configure passwords in ~/nas_docker/.env"
      - "   2. Configure staging passwords in ~/nas_docker_staging/.env"
      - "   3. Add webcms_repo_url and ui_repo_url to group_vars/all.yml"
      - "   4. Complete Drupal installation at http://localhost:8080"
      - "   5. Access Grafana and verify dashboards"
      - "   6. Test backup: ~/Scripts/backup-onprem.sh"
      - ""
      - "📚 Documentation:"
      - "   - DEPLOYMENT_CHECKLIST.md"
      - "   - IMPLEMENTATION_STATUS.md"
