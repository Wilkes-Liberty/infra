---
# Let's Encrypt Certificate Management Playbook for Wilkes Liberty Infrastructure

- name: Deploy Let's Encrypt certificates for cache servers
  hosts: cache
  become: yes
  gather_facts: yes
  
  vars:
    # Load Njalla API token from existing terraform secrets
    njalla_api_token: "{{ lookup('community.sops.sops', '../../terraform_secrets.yml') | from_yaml | json_query('njalla_api_token') }}"
    # Cache server specific certificates
    letsencrypt_certificates:
      - name: "internal_wildcard"
        domains: ["*.int.wilkesliberty.com"]
        challenge: "dns-01"
        services_to_restart: []  # No services installed yet
        description: "Internal services SSL certificate"
      - name: "main_domain"
        domains: ["wilkesliberty.com", "www.wilkesliberty.com"]
        challenge: "dns-01"
        services_to_restart: []  # No services installed yet
        description: "Main website SSL certificate"
      - name: "api_certificate"
        domains: ["api.wilkesliberty.com"]
        challenge: "dns-01"
        services_to_restart: []  # No services installed yet
        description: "API endpoint SSL certificate"
  
  pre_tasks:
    - name: Verify required variables are defined
      assert:
        that:
          - njalla_api_token is defined
          - njalla_api_token | length > 0
        fail_msg: "Njalla API token must be defined in letsencrypt_secrets.yml"
    
    - name: Create ssl-cert group if it doesn't exist
      group:
        name: ssl-cert
        state: present
    
    - name: Display target hosts for certificate deployment
      debug:
        msg: "Deploying certificates to: {{ inventory_hostname }} ({{ ansible_host }})"

  roles:
    - role: letsencrypt

