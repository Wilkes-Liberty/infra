---
# Let's Encrypt Certificate Management Playbook for Wilkes Liberty Infrastructure
#
# Deploys the wildcard certificate (wilkesliberty.com + *.wilkesliberty.com) to the
# Njalla VPS. The same certificate is also copied to the on-prem server for use by
# internal Caddy (*.int.wilkesliberty.com vhosts).
#
# NOTE: Certificate must first be obtained manually on the VPS:
#   certbot certonly --manual --preferred-challenges dns \
#     -d "wilkesliberty.com" -d "*.wilkesliberty.com"
# See LETSENCRYPT_SSL_GUIDE.md for full instructions.

- name: Deploy and renew Let's Encrypt wildcard certificate (Njalla VPS)
  hosts: vps
  become: yes
  gather_facts: yes

  vars:
    # Load Njalla API token from existing terraform secrets
    njalla_api_token: "{{ lookup('community.sops.sops', '../../terraform_secrets.yml') | from_yaml | json_query('njalla_api_token') }}"
    letsencrypt_certificates:
      - name: "wilkesliberty_wildcard"
        domains:
          - "wilkesliberty.com"
          - "*.wilkesliberty.com"
        challenge: "dns-01"
        services_to_restart:
          - caddy
        deploy_hook: "/etc/letsencrypt/renewal-hooks/deploy/reload-caddy.sh"
        description: "Wildcard certificate — all wilkesliberty.com subdomains"

  pre_tasks:
    - name: Verify Njalla API token is defined
      assert:
        that:
          - njalla_api_token is defined
          - njalla_api_token | length > 0
        fail_msg: "Njalla API token must be present in terraform_secrets.yml"

    - name: Create ssl-cert group if it does not exist
      group:
        name: ssl-cert
        state: present

    - name: Display target host
      debug:
        msg: "Deploying certificates to: {{ inventory_hostname }} ({{ ansible_host }})"

  roles:
    - role: letsencrypt

  post_tasks:
    - name: Verify wildcard certificate file exists
      stat:
        path: "/etc/letsencrypt/live/wilkesliberty.com/fullchain.pem"
      register: cert_stat

    - name: Report certificate status
      debug:
        msg: "Wildcard cert: {{ 'DEPLOYED' if cert_stat.stat.exists else 'MISSING' }}"

    - name: Verify HTTPS connectivity
      uri:
        url: "https://www.wilkesliberty.com"
        method: GET
        validate_certs: yes
        timeout: 10
      ignore_errors: yes
      register: https_check

    - name: Report HTTPS check result
      debug:
        msg: "HTTPS check for www.wilkesliberty.com: {{ https_check.status | default('Failed') }}"
