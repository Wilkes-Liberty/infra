- name: Deploy Let's Encrypt certificates for other servers (app, db, search)
  hosts: app:db:search
  become: yes
  gather_facts: yes
  
  vars:
    # Load Njalla API token from existing terraform secrets
    njalla_api_token: "{{ lookup('community.sops.sops', '../../terraform_secrets.yml') | from_yaml | json_query('njalla_api_token') }}"
    # Default certificates (from role defaults)
  
  pre_tasks:
    - name: Verify required variables are defined
      assert:
        that:
          - njalla_api_token is defined
          - njalla_api_token | length > 0
        fail_msg: "Njalla API token must be defined in letsencrypt_secrets.yml"
    
    - name: Create ssl-cert group if it doesn't exist
      group:
        name: ssl-cert
        state: present
    
    - name: Display target hosts for certificate deployment
      debug:
        msg: "Deploying certificates to: {{ inventory_hostname }} ({{ ansible_host }})"

  roles:
    - role: letsencrypt

  post_tasks:
    - name: Verify certificate files exist
      stat:
        path: "/etc/letsencrypt/live/{{ cert.domains[0] }}/fullchain.pem"
      register: cert_verification
      loop: "{{ letsencrypt_certificates }}"
      loop_control:
        loop_var: cert
    
    - name: Report certificate deployment status
      debug:
        msg: "Certificate {{ cert.item.name }} for {{ cert.item.domains[0] }}: {{ 'DEPLOYED' if cert.stat.exists else 'FAILED' }}"
      loop: "{{ cert_verification.results }}"
      loop_control:
        loop_var: cert
    
    - name: Test HTTPS connectivity (ignore certificate validation for internal)
      uri:
        url: "https://{{ ansible_fqdn | default(inventory_hostname) }}"
        method: GET
        validate_certs: no
        timeout: 10
        status_code: [200, 301, 302, 404]  # Accept redirects and not found (service might not be configured yet)
      register: https_test
      ignore_errors: yes
      when: 
        - ansible_fqdn is defined
        - not ansible_fqdn.endswith('.int.wilkesliberty.com')  # Only test external domains
    
    - name: Report HTTPS test results
      debug:
        msg: "HTTPS test for {{ ansible_fqdn | default(inventory_hostname) }}: {{ https_test.status | default('Failed') }}"
      when: https_test is defined

# Final verification and reporting
- name: Certificate deployment summary
  hosts: fleet
  become: yes
  gather_facts: no
  
  tasks:
    - name: Generate deployment summary
      shell: |
        echo "=== Certificate Deployment Summary for {{ inventory_hostname }} ==="
        echo "Date: $(date)"
        echo "Host: {{ inventory_hostname }} ({{ ansible_host | default('Unknown') }})"
        echo ""
        echo "Certificates:"
        if command -v certbot &> /dev/null; then
          certbot certificates 2>/dev/null || echo "No certificates found"
        else
          echo "Certbot not installed"
        fi
        echo ""
        echo "Certificate files:"
        ls -la /etc/letsencrypt/live/ 2>/dev/null || echo "No certificate directories found"
        echo ""
        echo "Recent certificate activity:"
        tail -5 /var/log/letsencrypt/certificate-management.log 2>/dev/null || echo "No certificate management log found"
      register: deployment_summary
      ignore_errors: yes
    
    - name: Display deployment summary
      debug:
        var: deployment_summary.stdout_lines