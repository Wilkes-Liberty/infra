---
# =============================================================================
# VPS Deployment Playbook — Cloud VPS
# =============================================================================
# Deploys the public ingress on the cloud VPS:
#   1. Obtains/renews wildcard Let's Encrypt certificate (DNS-01 via DNS API)
#   2. Installs and configures Caddy as the public reverse proxy
#
# Prerequisites:
#   - Tailscale must be running on the VPS (Section 5.2 of deployment guide)
#   - On-prem Tailscale IP must be resolvable from VPS
#   - njalla_api_token must be present in terraform_secrets.yml (SOPS-encrypted)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/vps.yml
# or via Makefile:
#   make vps
# =============================================================================

- name: Deploy Cloud VPS — Tailscale + Let's Encrypt + Caddy
  hosts: cloud-vps
  become: yes

  vars_files:
    - "../inventory/group_vars/all.yml"

  pre_tasks:
    - name: Load SOPS-encrypted secrets
      community.sops.load_vars:
        file: "{{ inventory_dir }}/group_vars/{{ item }}"
      loop:
        - network_secrets.yml
        - tailscale_secrets.yml
      no_log: true

    - name: Load Terraform secrets (provides njalla_api_token for DNS-01 challenge)
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../../terraform_secrets.yml"
      no_log: true

  roles:
    - role: tailscale
      vars:
        tailscale_hostname: "wl-vps"
        tailscale_advertise_routes: []       # VPS does not advertise subnets
        tailscale_split_dns_enabled: false   # VPS does not run CoreDNS
        tailscale_up_args: "--accept-routes --accept-dns=false"

    - role: letsencrypt
      vars:
        letsencrypt_certificates:
          - name: "wilkesliberty_wildcard"
            domains:
              - "wilkesliberty.com"
              - "*.wilkesliberty.com"
            challenge: "dns-01"
            services_to_restart:
              - caddy
            deploy_hook: "/etc/letsencrypt/renewal-hooks/deploy/reload-caddy.sh"
            description: "Wildcard certificate for all public wilkesliberty.com subdomains"
          - name: "int_wildcard"
            domains:
              - "int.wilkesliberty.com"
              - "*.int.wilkesliberty.com"
            challenge: "dns-01"
            services_to_restart: []
            deploy_hook: "/etc/letsencrypt/renewal-hooks/deploy/sync-int-cert-to-onprem.sh"
            description: "Wildcard certificate for internal *.int.wilkesliberty.com (synced to on-prem)"

  tasks:

    # ── Cert sync: int.wilkesliberty.com → on-prem ────────────────────────────
    # The VPS obtains the *.int.wilkesliberty.com cert and pushes it to the
    # on-prem machine over Tailscale after each renewal via a deploy hook.
    # An SSH key pair is used so the hook can run unattended as root.

    - name: Generate SSH key pair for cert sync (root → on-prem)
      openssh_keypair:
        path: /root/.ssh/id_ed25519_onprem
        type: ed25519
        comment: "vps-cert-sync@wilkesliberty"
        force: false
      register: sync_keypair

    - name: Display public key for on-prem authorized_keys (one-time manual step)
      debug:
        msg:
          - "⚠️  ONE-TIME MANUAL STEP (only needed on first run):"
          - "   Add this public key to ~/.ssh/authorized_keys on the on-prem machine:"
          - "   {{ sync_keypair.public_key }}"
          - "   Run on on-prem: echo '{{ sync_keypair.public_key }}' >> ~/.ssh/authorized_keys"
      when: sync_keypair.changed

    - name: Deploy cert sync hook script
      template:
        src: "{{ playbook_dir }}/../roles/letsencrypt/templates/sync-int-cert-to-onprem.sh.j2"
        dest: /etc/letsencrypt/renewal-hooks/deploy/sync-int-cert-to-onprem.sh
        mode: '0750'
        owner: root
        group: root

    - name: Run initial cert sync to on-prem (push cert immediately after obtaining)
      command: /etc/letsencrypt/renewal-hooks/deploy/sync-int-cert-to-onprem.sh
      ignore_errors: true

    # ── Caddy ─────────────────────────────────────────────────────────────────
    - name: Install Caddy
      apt:
        name: caddy
        state: present
        update_cache: yes

    - name: Deploy production Caddyfile
      template:
        src: "{{ playbook_dir }}/../roles/vps-proxy/templates/Caddyfile.production.j2"
        dest: /etc/caddy/Caddyfile
        mode: '0644'
        validate: caddy validate --config %s --adapter caddyfile
      notify: Reload Caddy

    - name: Ensure Caddy is enabled and running
      systemd:
        name: caddy
        enabled: true
        state: started

  handlers:
    - name: Reload Caddy
      systemd:
        name: caddy
        state: restarted
