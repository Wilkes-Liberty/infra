---
# =============================================================================
# VPS Deployment Playbook — Cloud VPS
# =============================================================================
# Deploys the public ingress on the cloud VPS:
#   1. Obtains/renews wildcard Let's Encrypt certificate (DNS-01 via DNS API)
#   2. Installs and configures Caddy as the public reverse proxy
#
# Prerequisites:
#   - Tailscale must be running on the VPS (Section 5.2 of deployment guide)
#   - On-prem Tailscale IP must be resolvable from VPS
#   - njalla_api_token must be present in terraform_secrets.yml (SOPS-encrypted)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/vps.yml
# or via Makefile:
#   make vps
# =============================================================================

- name: Deploy Cloud VPS — Tailscale + Let's Encrypt + Caddy
  hosts: cloud-vps
  become: yes

  vars_files:
    - "../inventory/group_vars/all.yml"

  pre_tasks:
    - name: Load SOPS-encrypted secrets
      community.sops.load_vars:
        file: "{{ inventory_dir }}/group_vars/{{ item }}"
      loop:
        - network_secrets.yml
        - tailscale_secrets.yml
      no_log: true

    - name: Load Terraform secrets (provides njalla_api_token for DNS-01 challenge)
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../../terraform_secrets.yml"
      no_log: true

  roles:
    - role: tailscale
      vars:
        tailscale_hostname: "wl-vps"
        tailscale_advertise_routes: []       # VPS does not advertise subnets
        tailscale_split_dns_enabled: false   # VPS does not run CoreDNS
        tailscale_up_args: "--accept-routes --accept-dns=false"

    - role: letsencrypt

  tasks:

    # ── Caddy ─────────────────────────────────────────────────────────────────
    - name: Install Caddy
      apt:
        name: caddy
        state: present
        update_cache: yes

    - name: Deploy production Caddyfile
      template:
        src: "{{ playbook_dir }}/../roles/vps-proxy/templates/Caddyfile.production.j2"
        dest: /etc/caddy/Caddyfile
        mode: '0644'
        validate: caddy validate --config %s --adapter caddyfile
      notify: Reload Caddy

    - name: Ensure Caddy is enabled and running
      systemd:
        name: caddy
        enabled: true
        state: started

  handlers:
    - name: Reload Caddy
      systemd:
        name: caddy
        state: reloaded
